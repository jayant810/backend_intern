services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: backend_assessment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"

  auth-service:
    build: ./services/auth-service
    container_name: auth_service
    ports:
      - "5001:5000"
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASS=password
      - DB_NAME=backend_assessment
      - DB_PORT=5432
      - PORT=5000
      - JWT_SECRET=secret_123
      - JWT_REFRESH_SECRET=refresh_secret_123
    depends_on:
      - db

  task-service:
    build: ./services/task-service
    container_name: task_service
    ports:
      - "5002:5000"
    volumes:
      - ./services/task-service:/app
      - /app/node_modules
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASS=password
      - DB_NAME=backend_assessment
      - DB_PORT=5432
      - PORT=5000
      - JWT_SECRET=secret_123
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_AUTH_API_URL=http://localhost:5001/api/v1
      - VITE_TASK_API_URL=http://localhost:5002/api/v1
    depends_on:
      - auth-service
      - task-service

volumes:
  postgres_data:
