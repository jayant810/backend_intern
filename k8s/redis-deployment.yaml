apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  labels:
    app: backend-assessment
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-assessment
      component: redis
  template:
    metadata:
      labels:
        app: backend-assessment
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: backend-assessment
    component: redis
spec:
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: backend-assessment
    component: redis
