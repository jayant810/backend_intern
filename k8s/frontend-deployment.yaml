apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-frontend
  labels:
    app: backend-assessment
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-assessment
      component: frontend
  template:
    metadata:
      labels:
        app: backend-assessment
        component: frontend
    spec:
      containers:
        - name: frontend
          image: backend-intern-frontend:latest # Make sure to tag your image as this
          imagePullPolicy: Never
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_BASE_URL
              value: "http://192.168.49.2:30008/api/v1" # Adjust if using a LoadBalancer/Ingress
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: backend-assessment
    component: frontend
spec:
  type: NodePort
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30007 # Access via <NodeIP>:30007
  selector:
    app: backend-assessment
    component: frontend
