apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-backend
  labels:
    app: backend-assessment
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-assessment
      component: backend
  template:
    metadata:
      labels:
        app: backend-assessment
        component: backend
    spec:
      containers:
        - name: backend
          image: backend-intern-backend:latest # Make sure to tag your image as this
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: DB_HOST
              value: "db"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: POSTGRES_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgres://postgres:password@db:5432/backend_assessment"
            - name: JWT_SECRET
              value: "mysecretkey"
            - name: JWT_EXPIRE
              value: 7d
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend-assessment
    component: backend
spec:
  type: NodePort
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30008
  selector:
    app: backend-assessment
    component: backend
